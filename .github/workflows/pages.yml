name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Process
        env:
          A7F516: ${{ secrets.A7F516 }}
          B24763: ${{ secrets.B24763 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A7F516', '')
          meta_b = os.environ.get('B24763', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- 2ac9ee3ef5929403baf68283b5 -->', meta_a)
              if meta_b:
                  out = out.replace('<!--  -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
