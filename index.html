<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>📧 Günlük Burç Bülteni</title>
<style>/* Aynı CSS */</style>
</head>
<body>
<div class="container">
<h1>📧 <span>Günlük</span> Burç Bülteni</h1>
<p class="sub">Her sabah burç yorumun e-postana gelsin!</p>
<div class="form-box">
<h3 style="color:#d4a8f0;text-align:center;">✉️ Abone Ol</h3>
<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
<div class="form-row"><input type="email" name="email" placeholder="E-posta adresiniz *" required></div>
<div class="form-row">
<select name="sign" style="padding:14px;background:#1f1129;border:1px solid #4a2a5a;border-radius:12px;color:#f0e8f5;font-size:15px;width:100%">
<option value="aries">♈ Koç</option><option value="taurus">♉ Boğa</option><option value="gemini">♊ İkizler</option>
<option value="cancer">♋ Yengeç</option><option value="leo">♌ Aslan</option><option value="virgo">♍ Başak</option>
<option value="libra">♎ Terazi</option><option value="scorpio">♏ Akrep</option><option value="sagittarius">♐ Yay</option>
<option value="capricorn">♑ Oğlak</option><option value="aquarius">♒ Kova</option><option value="pisces">♓ Balık</option>
</select>
</div>
<button type="submit" class="btn btn-primary">📨 Abone Ol</button>
</form>
<p style="color:#5a3a6a;font-size:13px;margin-top:15px;text-align:center;">⚡ Abone olduğunuzda günlük burç yorumunuz e-posta ile gönderilir. (Formspree ile)</p>
</div>
</div>
</body>
</html>
